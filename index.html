<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Race Leaderboard</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════
   BASE
═══════════════════════════════════════ */
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0a0a12;
  color: #ddd;
  font-family: 'Rajdhani', sans-serif;
  min-height: 100vh;
}

/* ═══════════════════════════════════════
   MODE TOGGLE BAR (always visible)
═══════════════════════════════════════ */
.mode-bar {
  display: flex;
  gap: 6px;
  padding: 8px 10px;
  background: rgba(0,0,0,0.6);
  border-bottom: 1px solid rgba(255,106,0,0.2);
  position: sticky;
  top: 0;
  z-index: 100;
  align-items: center;
}
.mode-btn {
  cursor: pointer;
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 5px;
  font-family: 'Orbitron', monospace;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2px;
  padding: 5px 12px;
  background: rgba(255,255,255,0.05);
  color: rgba(255,255,255,0.4);
  transition: all 0.15s;
}
.mode-btn.active {
  background: rgba(255,106,0,0.25);
  border-color: #ff6a00;
  color: #ff6a00;
}
.mode-btn:hover:not(.active) {
  background: rgba(255,255,255,0.1);
  color: #fff;
}
.mode-hint {
  font-size: 10px;
  color: rgba(255,255,255,0.25);
  margin-left: auto;
  letter-spacing: 1px;
}

/* ═══════════════════════════════════════
   VIEWS
═══════════════════════════════════════ */
#overlayView { display: none; }
#adminView   { display: none; }
#overlayView.active { display: block; }
#adminView.active   { display: block; }

/* ═══════════════════════════════════════
   OVERLAY VIEW
═══════════════════════════════════════ */
#overlayView {
  width: 320px;
  padding: 10px;
  margin: 0 auto;
}

.lap-header {
  background: linear-gradient(135deg, #4fc3f7, #81d4fa);
  border: 2px solid #b3e5fc;
  border-radius: 10px 10px 0 0;
  padding: 8px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 2px;
  position: relative;
  overflow: hidden;
  box-shadow: 0 0 20px rgba(79,195,247,0.5), inset 0 1px 0 rgba(255,255,255,0.3);
}
.lap-header::before {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 60%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
  animation: shimmer 3s infinite;
}
@keyframes shimmer {
  0%   { left: -100%; }
  100% { left: 200%; }
}
.lap-label {
  font-family: 'Black Ops One', cursive;
  font-size: 11px; font-weight: 400;
  color: rgba(0,40,80,0.8);
  letter-spacing: 4px;
  text-align: center;
}
.lap-value {
  font-family: 'Black Ops One', cursive;
  font-size: 36px; font-weight: 400;
  color: #fff;
  text-shadow: 0 0 20px rgba(255,255,255,0.7), 0 1px 3px rgba(0,60,120,0.4);
  letter-spacing: 4px;
  line-height: 1;
  text-align: center;
}
.header-logo {
  height: 52px;
  width: 52px;
  object-fit: contain;
  border-radius: 6px;
  flex-shrink: 0;
}
.header-title {
  font-family: 'Black Ops One', cursive;
  font-size: 20px;
  color: #fff;
  letter-spacing: 3px;
  text-shadow: 0 1px 4px rgba(0,40,100,0.4), 0 0 12px rgba(255,255,255,0.3);
  line-height: 1;
}


.board { display: flex; flex-direction: column; gap: 2px; }

.racer-row {
  display: grid;
  grid-template-columns: 36px 1fr;
  align-items: center;
  gap: 8px;
  padding: 7px 10px;
  background: rgba(10,10,20,0.88);
  border: 1px solid rgba(255,255,255,0.06);
  border-left: 3px solid transparent;
  border-radius: 5px;
  transition: all 0.5s cubic-bezier(0.34,1.56,0.64,1);
  position: relative; overflow: hidden;
}
.racer-row[data-pos="1"] { border-left-color:#FFD700; background:rgba(255,215,0,0.08); }
.racer-row[data-pos="2"] { border-left-color:#C0C0C0; background:rgba(192,192,192,0.05); }
.racer-row[data-pos="3"] { border-left-color:#CD7F32; background:rgba(205,127,50,0.07); }
.racer-row[data-pos="1"]::before {
  content:''; position:absolute; top:0;left:0;right:0;bottom:0;
  background:linear-gradient(90deg,rgba(255,215,0,0.12),transparent);
}
.racer-row.dnf { opacity:.45; border-left-color:#555!important; background:rgba(5,5,5,.9)!important; filter:grayscale(.6); }

.racer-row.moved-up   { animation: moveUp   0.6s ease-out; }
.racer-row.moved-down { animation: moveDown 0.6s ease-out; }
@keyframes moveUp   { 0%{transform:translateX(-8px);background-color:rgba(0,255,120,.15)} 100%{transform:translateX(0)} }
@keyframes moveDown { 0%{transform:translateX(8px);background-color:rgba(255,60,60,.12)}  100%{transform:translateX(0)} }

.pos-badge {
  font-family: 'Black Ops One', cursive;
  font-size: 15px; font-weight: 400;
  text-align: center; line-height: 1;
}
.racer-row[data-pos="1"] .pos-badge { color:#FFD700; text-shadow:0 0 10px rgba(255,215,0,.6); }
.racer-row[data-pos="2"] .pos-badge { color:#C0C0C0; text-shadow:0 0 8px rgba(192,192,192,.4); }
.racer-row[data-pos="3"] .pos-badge { color:#CD7F32; text-shadow:0 0 8px rgba(205,127,50,.4); }
.racer-row:not([data-pos="1"]):not([data-pos="2"]):not([data-pos="3"]) .pos-badge { color:rgba(255,255,255,.7); }
.racer-row.dnf .pos-badge { color:#555; }

.racer-name {
  font-size:15px; font-weight:700; color:#fff;
  letter-spacing:.5px; white-space:nowrap;
  overflow:hidden; text-overflow:ellipsis;
}
.racer-row.dnf .racer-name { color:#666; text-decoration:line-through; }
.dnf-tag { display:none; font-size:9px; color:#ff4040; font-family:'Orbitron',monospace; letter-spacing:1px; }
.racer-row.dnf .dnf-tag { display:inline; }

.racer-lap {
  font-family:'Orbitron',monospace; font-size:11px; font-weight:700;
  color:rgba(255,165,0,.9); text-align:right; white-space:nowrap;
}
.racer-row.dnf .racer-lap { color:#444; }

.live-dot {
  width:8px; height:8px; border-radius:50%;
  background:#00ff88;
  animation:pulse 1.5s infinite;
  display:inline-block; box-shadow:0 0 6px #00ff88;
}
@keyframes pulse {
  0%,100%{opacity:1;transform:scale(1)}
  50%{opacity:.4;transform:scale(.8)}
}
.ov-footer {
  display:flex; align-items:center; gap:6px;
  padding:5px 10px 3px;
  font-size:10px; color:rgba(255,255,255,.35);
  font-family:'Rajdhani',sans-serif; letter-spacing:1px;
}

/* ═══════════════════════════════════════
   ADMIN VIEW
═══════════════════════════════════════ */
#adminView { padding: 16px 20px; max-width: 680px; margin: 0 auto; }

.admin-title {
  font-family:'Black Ops One', cursive; font-size:18px;
  color:#ff6a00; letter-spacing:4px; text-align:center;
  margin-bottom:4px; text-shadow:0 0 20px rgba(255,106,0,.5);
}
.admin-subtitle {
  text-align:center; font-size:11px;
  color:rgba(255,255,255,.3); letter-spacing:2px; margin-bottom:18px;
}

.section { margin-bottom: 16px; }
.section-label {
  font-family:'Orbitron',monospace; font-size:9px; letter-spacing:3px;
  color:rgba(255,106,0,.7); margin-bottom:7px;
}

.lap-controls {
  display:flex; align-items:center; gap:10px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,106,0,.2);
  border-radius:8px; padding:10px 14px;
}
.lap-disp {
  font-family:'Orbitron',monospace; font-size:26px; font-weight:900;
  color:#ff6a00; min-width:44px; text-align:center;
}
.btn {
  cursor:pointer; border:none; border-radius:6px;
  font-family:'Orbitron',monospace; font-weight:700;
  transition:all .15s; letter-spacing:1px;
  user-select:none;
}
.btn:active { transform:scale(.95); }
.btn-lap {
  width:36px; height:36px; font-size:18px;
  background:rgba(255,106,0,.2); color:#ff6a00;
  border:1px solid rgba(255,106,0,.4);
}
.btn-lap:hover { background:rgba(255,106,0,.35); }
.total-wrap {
  display:flex; align-items:center; gap:8px;
  margin-left:auto; font-size:13px; color:rgba(255,255,255,.5);
}
.total-wrap input {
  width:50px; background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.15); border-radius:5px;
  color:#fff; font-family:'Orbitron',monospace;
  font-size:14px; font-weight:700; text-align:center; padding:5px;
}

/* Racer table */
.racer-table { display:flex; flex-direction:column; gap:4px; }
.racer-card {
  display:grid;
  grid-template-columns: 30px 30px 70px 1fr auto;
  align-items:center; gap:6px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.07);
  border-left:3px solid transparent;
  border-radius:7px; padding:7px 10px;
  transition:border-left-color .3s;
}
.racer-card[data-pos="1"] { border-left-color:#FFD700; }
.racer-card[data-pos="2"] { border-left-color:#C0C0C0; }
.racer-card[data-pos="3"] { border-left-color:#CD7F32; }
.racer-card.is-dnf { opacity:.5; border-left-color:#444!important; }

.pos-num {
  font-family:'Black Ops One', cursive; font-size:14px; font-weight:400;
  text-align:center; color:rgba(255,255,255,.6);
}
.racer-card[data-pos="1"] .pos-num { color:#FFD700; }
.racer-card[data-pos="2"] .pos-num { color:#C0C0C0; }
.racer-card[data-pos="3"] .pos-num { color:#CD7F32; }

.move-btns { display:flex; flex-direction:column; gap:2px; }
.btn-move {
  width:24px; height:16px; font-size:9px;
  background:rgba(255,255,255,.08); color:rgba(255,255,255,.6);
  border:1px solid rgba(255,255,255,.1); border-radius:3px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer;
}
.btn-move:hover { background:rgba(255,255,255,.18); color:#fff; }
.btn-move:disabled { opacity:.2; cursor:default; }

.lap-counter { display:flex; align-items:center; gap:3px; }
.btn-rl {
  width:20px; height:20px; font-size:12px;
  background:rgba(255,165,0,.15); color:#ffa500;
  border:1px solid rgba(255,165,0,.3); border-radius:4px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer;
}
.btn-rl:hover { background:rgba(255,165,0,.3); }
.rl-num {
  font-family:'Orbitron',monospace; font-size:11px;
  color:#ffa500; min-width:18px; text-align:center;
}

.name-input {
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);
  border-radius:5px; color:#fff;
  font-family:'Rajdhani',sans-serif;
  font-size:14px; font-weight:700;
  padding:4px 8px; width:100%;
  transition:border-color .2s;
}
.name-input:focus { outline:none; border-color:rgba(255,106,0,.5); }
.is-dnf .name-input { text-decoration:line-through; color:#666; }

.btn-dnf {
  padding:4px 9px; font-size:9px; cursor:pointer;
  background:rgba(255,40,40,.15); color:#ff4040;
  border:1px solid rgba(255,40,40,.35); border-radius:5px;
  font-family:'Orbitron',monospace; letter-spacing:1px;
  transition:all .15s;
}
.btn-dnf:hover { background:rgba(255,40,40,.35); }
.is-dnf .btn-dnf {
  background:rgba(100,255,100,.1); color:#55ff88;
  border-color:rgba(100,255,100,.3);
}
.is-dnf .btn-dnf:hover { background:rgba(100,255,100,.25); }

.bottom-bar { display:flex; gap:10px; margin-top:14px; }
.btn-reset {
  flex:1; padding:10px; font-size:11px; cursor:pointer;
  background:rgba(255,255,255,.05); color:rgba(255,255,255,.4);
  border:1px solid rgba(255,255,255,.1); border-radius:7px;
  font-family:'Orbitron',monospace; letter-spacing:1px; transition:all .15s;
}
.btn-reset:hover { background:rgba(255,255,255,.1); color:#fff; }

.status-bar {
  text-align:center; font-size:10px; color:#00ff88;
  font-family:'Orbitron',monospace; letter-spacing:2px;
  margin-top:10px; height:16px; opacity:0; transition:opacity .3s;
}
.status-bar.show { opacity:1; }
</style>
</head>

<div id="adminView">
  <div class="admin-title">🏁 RACE CONTROL</div>
  <div class="admin-subtitle">CHANGES APPLY INSTANTLY TO OVERLAY</div>

  <div class="section">
    <div class="section-label">RACE LAP</div>
    <div class="lap-controls">
      <button class="btn btn-lap" onclick="changeLap(-1)">−</button>
      <div class="lap-disp" id="ad_lapDisp">1</div>
      <button class="btn btn-lap" onclick="changeLap(1)">+</button>
      <div class="total-wrap">
        <span>/ Total:</span>
        <input type="number" id="ad_totalLaps" value="5" min="1" max="99" onchange="updateTotalLaps()">
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-label">POSITIONS — ▲▼ SWAP · NAME · LAP · DNF</div>
    <div class="racer-table" id="ad_table"></div>
  </div>

  <div class="bottom-bar">
    <button class="btn btn-reset" onclick="resetAll()">↺ RESET ALL</button>
    <button class="btn btn-reset" onclick="resetLaps()">↺ RESET LAPS ONLY</button>
  </div>
  <div class="status-bar" id="statusBar">● SYNCED</div>
</div>

<script>
/* ══════════════════════════════════════════
   DATA
══════════════════════════════════════════ */
const STORAGE_KEY = 'raceData_v3';
let prevOrder = [];
let statusTimeout;
let currentMode = 'overlay';

function defaultData() {
  return {
    lap: 1,
    totalLaps: 5,
    racers: Array.from({ length: 10 }, (_, i) => ({
      id: i,
      name: `Racer ${i + 1}`,
      lap: 1,
      dnf: false,
      pos: i + 1
    }))
  };
}

function loadData() {
  try {
    const d = localStorage.getItem(STORAGE_KEY);
    return d ? JSON.parse(d) : defaultData();
  } catch { return defaultData(); }
}

function saveData(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  flashStatus();
  renderAll(data);
}

function flashStatus() {
  const bar = document.getElementById('statusBar');
  if (!bar) return;
  bar.classList.add('show');
  clearTimeout(statusTimeout);
  statusTimeout = setTimeout(() => bar.classList.remove('show'), 1500);
}

/* ══════════════════════════════════════════
   MODE SWITCHING
══════════════════════════════════════════ */
function setMode(mode) {
  currentMode = mode;
  document.getElementById('overlayView').classList.toggle('active', mode === 'overlay');
  document.getElementById('adminView').classList.toggle('active', mode === 'admin');
  document.getElementById('btnOverlay').classList.toggle('active', mode === 'overlay');
  document.getElementById('btnAdmin').classList.toggle('active', mode === 'admin');
  // Set bg transparent for OBS
  document.body.style.background = mode === 'overlay' ? 'transparent' : '#0a0a12';
  renderAll(loadData());
}

/* ══════════════════════════════════════════
   OVERLAY RENDER
══════════════════════════════════════════ */
function renderOverlay(data) {
  document.getElementById('ov_lapDisplay').textContent = data.lap;

  const sorted = [...data.racers].sort((a, b) => {
    if (a.dnf && !b.dnf) return 1;
    if (!a.dnf && b.dnf) return -1;
    return a.pos - b.pos;
  });

  const board = document.getElementById('ov_board');
  const existingRows = {};
  board.querySelectorAll('.racer-row').forEach(r => existingRows[r.dataset.id] = r);

  const newOrder = sorted.map(r => r.id);

  sorted.forEach((racer, idx) => {
    let row = existingRows[racer.id];
    const displayPos = idx + 1;

    if (!row) {
      row = document.createElement('div');
      row.className = 'racer-row';
      row.dataset.id = racer.id;
    }

    row.dataset.pos = racer.dnf ? 'dnf' : displayPos;
    row.className = 'racer-row' + (racer.dnf ? ' dnf' : '');

    const oldIdx = prevOrder.indexOf(racer.id);
    if (prevOrder.length > 0 && oldIdx !== -1 && oldIdx !== idx) {
      const cls = oldIdx > idx ? 'moved-up' : 'moved-down';
      row.classList.add(cls);
      setTimeout(() => row.classList.remove(cls), 700);
    }

    const posLabel = racer.dnf ? '✕' : displayPos;

    row.innerHTML = `
      <div class="pos-badge">${posLabel}</div>
      <div>
        <div class="racer-name">${esc(racer.name)}</div>
        <div class="dnf-tag">DNF</div>
      </div>
    `;

    board.appendChild(row);
  });

  // Remove stale rows
  Object.keys(existingRows).forEach(id => {
    if (!sorted.find(r => r.id == id)) existingRows[id].remove();
  });

  prevOrder = newOrder;
}

/* ══════════════════════════════════════════
   ADMIN RENDER
══════════════════════════════════════════ */
function renderAdmin(data) {
  document.getElementById('ad_lapDisp').textContent = data.lap;
  document.getElementById('ad_totalLaps').value = data.totalLaps;

  const sorted = [...data.racers].sort((a, b) => {
    if (a.dnf && !b.dnf) return 1;
    if (!a.dnf && b.dnf) return -1;
    return a.pos - b.pos;
  });

  const table = document.getElementById('ad_table');
  table.innerHTML = '';

  sorted.forEach((racer, idx) => {
    const displayPos = racer.dnf ? '✕' : (idx + 1);
    const card = document.createElement('div');
    card.className = 'racer-card' + (racer.dnf ? ' is-dnf' : '');
    card.dataset.pos = racer.dnf ? 'dnf' : (idx + 1);

    card.innerHTML = `
      <div class="pos-num">${displayPos}</div>
      <div class="move-btns">
        <button class="btn-move" onclick="moveRacer(${racer.id},-1)" ${racer.dnf ? 'disabled' : ''}>▲</button>
        <button class="btn-move" onclick="moveRacer(${racer.id}, 1)" ${racer.dnf ? 'disabled' : ''}>▼</button>
      </div>
      <div class="lap-counter">
        <button class="btn-rl" onclick="changeRacerLap(${racer.id},-1)">−</button>
        <div class="rl-num">${racer.lap}</div>
        <button class="btn-rl" onclick="changeRacerLap(${racer.id}, 1)">+</button>
      </div>
      <input class="name-input" value="${esc(racer.name)}"
        oninput="updateName(${racer.id},this.value)"
        placeholder="Racer name" ${racer.dnf ? 'disabled' : ''}>
      <button class="btn btn-dnf" onclick="toggleDNF(${racer.id})">
        ${racer.dnf ? 'RESTORE' : 'DNF'}
      </button>
    `;
    table.appendChild(card);
  });
}

function renderAll(data) {
  renderOverlay(data);
  renderAdmin(data);
}

/* ══════════════════════════════════════════
   ACTIONS
══════════════════════════════════════════ */
function changeLap(delta) {
  const data = loadData();
  data.lap = Math.max(1, Math.min(data.totalLaps, data.lap + delta));
  saveData(data);
}

function updateTotalLaps() {
  const data = loadData();
  data.totalLaps = parseInt(document.getElementById('ad_totalLaps').value) || 5;
  saveData(data);
}

function moveRacer(id, dir) {
  const data = loadData();
  const racer = data.racers.find(r => r.id === id);
  if (!racer || racer.dnf) return;
  const sorted = [...data.racers].filter(r => !r.dnf).sort((a, b) => a.pos - b.pos);
  const idx = sorted.findIndex(r => r.id === id);
  const swapIdx = idx + dir;
  if (swapIdx < 0 || swapIdx >= sorted.length) return;
  const swap = sorted[swapIdx];
  [racer.pos, swap.pos] = [swap.pos, racer.pos];
  saveData(data);
}

function toggleDNF(id) {
  const data = loadData();
  const racer = data.racers.find(r => r.id === id);
  if (!racer) return;
  racer.dnf = !racer.dnf;
  if (racer.dnf) {
    racer.pos = 1000 + racer.id;
  } else {
    const maxPos = Math.max(0, ...data.racers.filter(r => !r.dnf && r.id !== id).map(r => r.pos));
    racer.pos = maxPos + 1;
  }
  saveData(data);
}

function changeRacerLap(id, delta) {
  const data = loadData();
  const racer = data.racers.find(r => r.id === id);
  if (!racer) return;
  racer.lap = Math.max(1, Math.min(data.totalLaps, racer.lap + delta));
  saveData(data);
}

function updateName(id, value) {
  const data = loadData();
  const racer = data.racers.find(r => r.id === id);
  if (!racer) return;
  racer.name = value;
  saveData(data);
}

function resetAll() {
  if (!confirm('Reset everything to defaults?')) return;
  saveData(defaultData());
}

function resetLaps() {
  const data = loadData();
  data.lap = 1;
  data.racers.forEach(r => r.lap = 1);
  saveData(data);
}

function esc(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ══════════════════════════════════════════
   INIT
══════════════════════════════════════════ */
renderAll(loadData());

// Poll every 300ms so overlay stays in sync even across OBS popouts
setInterval(() => { if (currentMode === 'overlay') renderOverlay(loadData()); }, 300);
</script>
</body>
</html>
