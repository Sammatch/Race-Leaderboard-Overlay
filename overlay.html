<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Race Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:transparent; font-family:'Rajdhani',sans-serif; width:320px; padding:10px; overflow:hidden; }

.lap-header {
  background: linear-gradient(135deg,#4fc3f7,#81d4fa);
  border: 2px solid #b3e5fc;
  border-radius: 10px 10px 0 0;
  padding: 8px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 2px;
  position: relative;
  overflow: hidden;
  box-shadow: 0 0 20px rgba(79,195,247,0.5), inset 0 1px 0 rgba(255,255,255,0.3);
}
.lap-header::before {
  content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent);
  animation:shimmer 3s infinite;
}
@keyframes shimmer { 0%{left:-100%} 100%{left:200%} }

.header-logo { height:52px;width:52px;object-fit:contain;border-radius:6px;flex-shrink:0; }
.header-title { font-family:'Black Ops One',cursive;font-size:20px;color:#fff;letter-spacing:3px;text-shadow:0 1px 4px rgba(0,40,100,0.4),0 0 12px rgba(255,255,255,0.3);line-height:1; }
.lap-label { font-family:'Black Ops One',cursive;font-size:11px;color:rgba(0,40,80,0.8);letter-spacing:4px;text-align:center; }
.lap-value { font-family:'Black Ops One',cursive;font-size:36px;color:#fff;text-shadow:0 0 20px rgba(255,255,255,0.7),0 1px 3px rgba(0,60,120,0.4);letter-spacing:4px;line-height:1;text-align:center; }

.board { display:flex;flex-direction:column;gap:2px; }
.racer-row {
  display:grid;grid-template-columns:36px 1fr;align-items:center;gap:8px;
  padding:7px 10px;background:rgba(10,10,20,0.88);
  border:1px solid rgba(255,255,255,0.06);border-left:3px solid transparent;
  border-radius:5px;transition:all 0.5s cubic-bezier(0.34,1.56,0.64,1);
  position:relative;overflow:hidden;
}
.racer-row[data-pos="1"]{border-left-color:#FFD700;background:rgba(255,215,0,0.08);}
.racer-row[data-pos="2"]{border-left-color:#C0C0C0;background:rgba(192,192,192,0.05);}
.racer-row[data-pos="3"]{border-left-color:#CD7F32;background:rgba(205,127,50,0.07);}
.racer-row[data-pos="1"]::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(90deg,rgba(255,215,0,0.12),transparent);}
.racer-row.dnf{opacity:.45;border-left-color:#555!important;background:rgba(5,5,5,.9)!important;filter:grayscale(.6);}
.racer-row.moved-up{animation:moveUp 0.6s ease-out;}
.racer-row.moved-down{animation:moveDown 0.6s ease-out;}
@keyframes moveUp{0%{transform:translateX(-8px);background-color:rgba(0,255,120,.15)}100%{transform:translateX(0)}}
@keyframes moveDown{0%{transform:translateX(8px);background-color:rgba(255,60,60,.12)}100%{transform:translateX(0)}}

.pos-badge{font-family:'Black Ops One',cursive;font-size:15px;text-align:center;line-height:1;}
.racer-row[data-pos="1"] .pos-badge{color:#FFD700;text-shadow:0 0 10px rgba(255,215,0,.6);}
.racer-row[data-pos="2"] .pos-badge{color:#C0C0C0;text-shadow:0 0 8px rgba(192,192,192,.4);}
.racer-row[data-pos="3"] .pos-badge{color:#CD7F32;text-shadow:0 0 8px rgba(205,127,50,.4);}
.racer-row:not([data-pos="1"]):not([data-pos="2"]):not([data-pos="3"]) .pos-badge{color:rgba(255,255,255,.7);}
.racer-row.dnf .pos-badge{color:#555;}
.racer-name{font-size:15px;font-weight:700;color:#fff;letter-spacing:.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.racer-row.dnf .racer-name{color:#666;text-decoration:line-through;}
.dnf-tag{display:none;font-size:9px;color:#ff4040;font-family:'Black Ops One',cursive;letter-spacing:1px;}
.racer-row.dnf .dnf-tag{display:inline;}
.live-dot{width:8px;height:8px;border-radius:50%;background:#00ff88;animation:pulse 1.5s infinite;display:inline-block;box-shadow:0 0 6px #00ff88;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
.ov-footer{display:flex;align-items:center;gap:6px;padding:5px 10px 3px;font-size:10px;color:rgba(255,255,255,.35);letter-spacing:1px;}
</style>
</head>

const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR1d2ZrZW5jb3Zpcmpwanp0aHNiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5OTQyMzUsImV4cCI6MjA5MDU3MDIzNX0.1NFOda1rNZZHzdaWnbHOT1EcI6_MH3akuNdc8s5tW38';
let prevOrder = [];

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

async function fetchData(){
  const r = await fetch(SUPABASE_URL+'/rest/v1/race_state?id=eq.1&select=data',{
    headers:{'apikey':ANON_KEY,'Authorization':'Bearer '+ANON_KEY}
  });
  const rows = await r.json();
  if(rows && rows[0] && rows[0].data){
    try{ return JSON.parse(rows[0].data); }catch(e){}
  }
  return null;
}

function render(data){
  if(!data || !data.racers) return;
  document.getElementById('lapDisplay').textContent = data.lap || 1;
  const sorted = [...data.racers].sort((a,b)=>{
    if(a.dnf&&!b.dnf)return 1;if(!a.dnf&&b.dnf)return -1;return a.pos-b.pos;
  });
  const board = document.getElementById('board');
  const existing = {};
  board.querySelectorAll('.racer-row').forEach(r=>existing[r.dataset.id]=r);
  const newOrder = sorted.map(r=>r.id);
  sorted.forEach((racer,idx)=>{
    let row = existing[racer.id];
    const dp = idx+1;
    if(!row){row=document.createElement('div');row.className='racer-row';row.dataset.id=racer.id;}
    row.dataset.pos = racer.dnf?'dnf':dp;
    row.className = 'racer-row'+(racer.dnf?' dnf':'');
    const oldIdx = prevOrder.indexOf(racer.id);
    if(prevOrder.length>0&&oldIdx!==-1&&oldIdx!==idx){
      const cls=oldIdx>idx?'moved-up':'moved-down';
      row.classList.add(cls);setTimeout(()=>row.classList.remove(cls),700);
    }
    row.innerHTML='<div class="pos-badge">'+(racer.dnf?'✕':dp)+'</div><div><div class="racer-name">'+esc(racer.name)+'</div><div class="dnf-tag">DNF</div></div>';
    board.appendChild(row);
  });
  Object.keys(existing).forEach(id=>{if(!sorted.find(r=>r.id==id))existing[id].remove();});
  prevOrder=newOrder;
}

// Subscribe to real-time changes
async function subscribe(){
  const data = await fetchData();
  if(data) render(data);

  // Poll every second as reliable fallback
  setInterval(async()=>{
    const d = await fetchData();
    if(d) render(d);
  }, 1000);

  // Also use Supabase realtime
  const ws = new WebSocket('wss://duwfkencovirjpjzthsb.supabase.co/realtime/v1/websocket?apikey='+ANON_KEY+'&vsn=1.0.0');
  ws.onopen = ()=>{
    ws.send(JSON.stringify({topic:'realtime:public:race_state',event:'phx_join',payload:{},ref:null}));
  };
  ws.onmessage = async(e)=>{
    const msg = JSON.parse(e.data);
    if(msg.event==='UPDATE'||msg.event==='INSERT'){
      const d = await fetchData();
      if(d) render(d);
    }
  };
  ws.onclose = ()=>setTimeout(subscribe,2000);
}

subscribe();
</script>
</body>
</html>
